<!DOCTYPE html>
<html lang="id" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AZANA Magic Eraser - Hapus Objek AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&family=Rajdhani:wght@600;700;800&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Poppins', 'sans-serif'], tech: ['Rajdhani', 'sans-serif'] },
                    colors: { neon: { cyan: '#00f2fe', purple: '#a855f7' }, dark: { 900: '#0a0a0f', 800: '#13131a', 700: '#1c1c26' } }
                }
            }
        }
    </script>
    <style>
        body { background-color: #0a0a0f; color: #cbd5e1; overscroll-behavior-y: contain; }
        .glass-card { background: rgba(19, 19, 26, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(0, 242, 254, 0.2); }
        
        /* Area Kanvas */
        .canvas-wrapper { position: relative; display: inline-block; max-width: 100%; border-radius: 0.5rem; overflow: hidden; box-shadow: 0 0 20px rgba(0, 242, 254, 0.15); cursor: crosshair; }
        #image-canvas { display: block; max-width: 100%; height: auto; }
        #draw-canvas { position: absolute; top: 0; left: 0; touch-action: none; width: 100%; height: 100%; }
        
        /* Kaca Pembesar (Loupe) */
        #magnifier { 
            width: 110px; height: 110px; 
            border-radius: 50%; border: 3px solid #00f2fe; 
            box-shadow: 0 0 20px rgba(168,85,247,0.8), inset 0 0 10px rgba(0,242,254,0.5); 
            background-color: #0a0a0f; transform: translate(-50%, -100%); margin-top: -40px; 
            z-index: 50; pointer-events: none; 
        }
        #loupe-canvas { width: 100%; height: 100%; border-radius: 50%; }

        /* Range Slider Kuas */
        input[type=range] { -webkit-appearance: none; width: 100%; background: transparent; }
        input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; height: 20px; width: 20px; border-radius: 50%; background: #00f2fe; cursor: pointer; box-shadow: 0 0 10px #00f2fe; margin-top: -8px; }
        input[type=range]::-webkit-slider-runnable-track { width: 100%; height: 4px; cursor: pointer; background: #1c1c26; border-radius: 2px; border: 1px solid rgba(0,242,254,0.3); }

        /* Loader */
        .loader-pulse { animation: pulseGlow 1.5s infinite alternate; }
        @keyframes pulseGlow { 0% { opacity: 0.6; filter: drop-shadow(0 0 5px #00f2fe); } 100% { opacity: 1; filter: drop-shadow(0 0 15px #a855f7); } }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center p-4 md:p-6 bg-[radial-gradient(circle_at_top,_var(--tw-gradient-stops))] from-dark-800 to-dark-900 pb-20">

    <div id="magnifier" class="hidden fixed flex items-center justify-center">
        <canvas id="loupe-canvas" width="110" height="110"></canvas>
        <div class="absolute inset-0 flex items-center justify-center">
            <div class="w-1.5 h-1.5 bg-neon-cyan rounded-full shadow-[0_0_5px_#fff]"></div>
            <div class="absolute w-full h-[1px] bg-white/30"></div>
            <div class="absolute h-full w-[1px] bg-white/30"></div>
        </div>
    </div>

    <header class="text-center w-full max-w-3xl mt-4 mb-6">
        <div class="flex items-center justify-center gap-3 mb-2">
            <div class="w-10 h-10 rounded-lg bg-neon-cyan/10 border border-neon-cyan/50 flex items-center justify-center text-neon-cyan shadow-[0_0_15px_rgba(0,242,254,0.3)]">
                <i class="fas fa-eraser text-xl"></i>
            </div>
            <h1 class="text-2xl md:text-4xl font-tech font-bold text-white tracking-wider uppercase">
                AZANA <span class="text-transparent bg-clip-text bg-gradient-to-r from-neon-cyan to-neon-purple">MAGIC ERASER</span>
            </h1>
        </div>
        <p class="text-slate-400 text-xs md:text-sm max-w-lg mx-auto">Usap objek yang mengganggu dengan kuas aurora. AI kami akan membersihkannya!</p>
    </header>

    <main class="w-full max-w-4xl glass-card rounded-2xl p-4 md:p-8 shadow-2xl relative overflow-hidden flex flex-col items-center">
        
        <div id="upload-area" onclick="document.getElementById('file-input').click()" class="w-full border-2 border-dashed border-dark-600 hover:border-neon-cyan/50 rounded-xl p-10 text-center transition-all duration-300 bg-dark-900/50 cursor-pointer group">
            <input type="file" id="file-input" class="hidden" accept="image/*">
            <div class="w-16 h-16 bg-dark-800 rounded-full flex items-center justify-center mx-auto mb-4 text-3xl text-neon-purple group-hover:text-neon-cyan transition-all shadow-[0_0_20px_rgba(168,85,247,0.2)]">
                <i class="fas fa-upload"></i>
            </div>
            <h3 class="text-lg font-bold text-white mb-1 font-tech uppercase tracking-wide">Pilih Foto Mentah</h3>
            <p class="text-slate-500 text-xs">Klik di sini untuk mulai mengedit.</p>
        </div>

        <div id="editor-area" class="hidden w-full flex-col items-center">
            
            <div class="w-full max-w-md flex items-center justify-between gap-3 mb-4 bg-dark-900 p-3 rounded-lg border border-dark-700">
                <div class="flex items-center gap-3 flex-grow">
                    <i class="fas fa-paint-brush text-neon-cyan text-sm"></i>
                    <input type="range" id="brush-size" min="10" max="80" value="30" class="flex-grow w-full">
                </div>
                
                <div class="flex items-center gap-2">
                    <button id="btn-undo" class="text-xs text-yellow-400 hover:text-yellow-300 px-3 py-2 bg-yellow-400/10 rounded border border-yellow-400/30 transition whitespace-nowrap" title="Kembali 1 Langkah">
                        <i class="fas fa-undo"></i>
                    </button>
                    <button id="btn-clear" class="text-xs text-red-400 hover:text-red-300 px-3 py-2 bg-red-400/10 rounded border border-red-400/30 transition whitespace-nowrap" title="Hapus Semua Coretan">
                        <i class="fas fa-trash-alt"></i>
                    </button>
                </div>
            </div>

            <div class="canvas-wrapper bg-dark-900" id="canvas-wrapper">
                <canvas id="image-canvas"></canvas>
                <canvas id="draw-canvas"></canvas>
            </div>

            <div class="mt-6 flex gap-3 w-full max-w-md">
                <button onclick="location.reload()" class="flex-1 py-3 px-2 rounded-full border border-dark-600 text-slate-300 font-bold hover:bg-dark-700 transition text-xs md:text-sm">
                    <i class="fas fa-redo mr-1"></i> Ganti Foto
                </button>
                <button id="btn-process" class="flex-[2] bg-gradient-to-r from-neon-cyan to-neon-purple text-white font-bold py-3 px-4 rounded-full shadow-[0_0_15px_rgba(0,242,254,0.4)] hover:scale-105 transition-transform text-xs md:text-sm flex justify-center items-center">
                    <i class="fas fa-magic mr-2"></i> Hapus Objek
                </button>
            </div>
        </div>

        <div id="result-area" class="hidden w-full flex-col items-center mt-6 border-t border-dark-700 pt-8">
            <div class="w-12 h-1 bg-gradient-to-r from-neon-cyan to-neon-purple rounded-full mb-4"></div>
            <h3 class="text-white font-tech tracking-widest text-xl uppercase mb-6 font-bold"><i class="fas fa-check-circle text-neon-cyan mr-2"></i>Hasil AI Azana</h3>
            
            <div class="relative rounded-lg overflow-hidden shadow-[0_0_25px_rgba(168,85,247,0.3)] mb-6 border border-dark-600">
                <img id="result-image" src="" alt="Hasil Akhir" class="max-w-full h-auto">
            </div>
            
            <a id="btn-download" href="#" download="AZANA_MagicEraser_Result.jpg" class="w-full max-w-md text-center bg-dark-800 border-2 border-neon-cyan text-neon-cyan hover:bg-neon-cyan hover:text-dark-900 font-bold py-3 px-4 rounded-full transition-all shadow-[0_0_15px_rgba(0,242,254,0.2)]">
                <i class="fas fa-download mr-2"></i>Simpan Gambar HD
            </a>
        </div>

    </main>

    <div id="notification" class="fixed bottom-5 left-1/2 -translate-x-1/2 bg-dark-800 border border-neon-cyan text-white px-6 py-3 rounded-full shadow-[0_0_20px_rgba(0,242,254,0.3)] transform translate-y-full opacity-0 transition-all duration-300 z-[100] text-center text-sm font-bold w-[90%] max-w-sm pointer-events-none flex items-center justify-center gap-2">
        <span id="notif-icon"><i class="fas fa-info-circle text-neon-cyan"></i></span>
        <span id="notif-text">Notifikasi</span>
    </div>

    <script>
        // ==========================================
        // API KEY AZANA SUDAH TERPASANG BOS!
        // ==========================================
        const apiKey = "AIzaSyCS7QD0MVfPjDBK5cP9AM0cpk-REzFUvcU"; 
        // ==========================================

        const fileInput = document.getElementById('file-input');
        const uploadArea = document.getElementById('upload-area');
        const editorArea = document.getElementById('editor-area');
        const resultArea = document.getElementById('result-area');
        const resultImage = document.getElementById('result-image');
        
        const imgCanvas = document.getElementById('image-canvas');
        const drawCanvas = document.getElementById('draw-canvas');
        const loupeCanvas = document.getElementById('loupe-canvas');
        const magnifier = document.getElementById('magnifier');
        
        const ctxImg = imgCanvas.getContext('2d');
        const ctxDraw = drawCanvas.getContext('2d', { willReadFrequently: true });
        const ctxLoupe = loupeCanvas.getContext('2d');
        
        const brushSizeInput = document.getElementById('brush-size');
        const btnClear = document.getElementById('btn-clear');
        const btnUndo = document.getElementById('btn-undo');
        const btnProcess = document.getElementById('btn-process');
        
        const notif = document.getElementById('notification');
        const notifText = document.getElementById('notif-text');
        const notifIcon = document.getElementById('notif-icon');

        let isDrawing = false;
        let imageObj = new Image();
        let hue = 180; let hueDirection = 1;
        
        // Variabel untuk History Undo
        let brushHistory = [];

        // Fungsi Tampilkan Notifikasi Elegan
        function showNotification(msg, isError = false) {
            notifText.innerText = msg;
            if (isError) {
                notif.classList.replace('border-neon-cyan', 'border-red-500');
                notif.classList.replace('shadow-[0_0_20px_rgba(0,242,254,0.3)]', 'shadow-[0_0_20px_rgba(239,68,68,0.4)]');
                notifIcon.innerHTML = '<i class="fas fa-exclamation-triangle text-red-500"></i>';
            } else {
                notif.classList.replace('border-red-500', 'border-neon-cyan');
                notif.classList.replace('shadow-[0_0_20px_rgba(239,68,68,0.4)]', 'shadow-[0_0_20px_rgba(0,242,254,0.3)]');
                notifIcon.innerHTML = '<i class="fas fa-info-circle text-neon-cyan"></i>';
            }
            notif.classList.remove('translate-y-full', 'opacity-0');
            setTimeout(() => { notif.classList.add('translate-y-full', 'opacity-0'); }, 4000);
        }

        // 1. UPLOAD & SETUP KANVAS
        fileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if(!file) return;
            const reader = new FileReader();
            reader.onload = (event) => {
                imageObj.onload = () => {
                    uploadArea.classList.add('hidden');
                    editorArea.classList.remove('hidden');
                    editorArea.classList.add('flex');
                    setTimeout(setupCanvas, 100);
                };
                imageObj.src = event.target.result;
            };
            reader.readAsDataURL(file);
        });

        function setupCanvas() {
            const wrapper = document.getElementById('canvas-wrapper');
            const maxWidth = wrapper.clientWidth;
            const scale = Math.min(1, maxWidth / imageObj.width);
            const w = imageObj.width * scale;
            const h = imageObj.height * scale;

            imgCanvas.width = w; imgCanvas.height = h;
            ctxImg.drawImage(imageObj, 0, 0, w, h);

            drawCanvas.width = w; drawCanvas.height = h;
            ctxDraw.lineCap = 'round'; ctxDraw.lineJoin = 'round'; ctxDraw.shadowBlur = 10;
            
            // Reset & Simpan state awal kanvas kosong
            brushHistory = [];
            saveState();
        }

        function getPos(evt) {
            const rect = drawCanvas.getBoundingClientRect();
            let clientX, clientY;
            if (evt.touches && evt.touches.length > 0) { clientX = evt.touches[0].clientX; clientY = evt.touches[0].clientY; } 
            else { clientX = evt.clientX; clientY = evt.clientY; }
            return {
                canvasX: (clientX - rect.left) * (drawCanvas.width / rect.width),
                canvasY: (clientY - rect.top) * (drawCanvas.height / rect.height),
                screenX: clientX, screenY: clientY
            };
        }

        // --- SISTEM UNDO & HISTORY ---
        function saveState() {
            // Batasi memori (maksimal simpan 15 langkah)
            if (brushHistory.length > 15) {
                brushHistory.shift(); 
            }
            // Simpan gambar kanvas saat ini
            brushHistory.push(ctxDraw.getImageData(0, 0, drawCanvas.width, drawCanvas.height));
        }

        btnUndo.addEventListener('click', () => {
            if (brushHistory.length > 1) {
                brushHistory.pop(); // Buang state saat ini
                const prevState = brushHistory[brushHistory.length - 1]; // Ambil yang sebelumnya
                ctxDraw.putImageData(prevState, 0, 0); // Terapkan
            } else {
                showNotification("Sudah kembali ke awal!", false);
            }
        });

        btnClear.addEventListener('click', () => {
            ctxDraw.clearRect(0, 0, drawCanvas.width, drawCanvas.height);
            brushHistory = [];
            saveState(); // Simpan state kosong lagi
            showNotification("Coretan dibersihkan", false);
        });
        // ------------------------------

        // 2. LOGIKA KACA PEMBESAR & MENGGAMBAR (AURORA BRUSH)
        function updateMagnifier(pos) {
            const zoom = 2; const loupeSize = 110;
            magnifier.style.left = pos.screenX + 'px'; magnifier.style.top = pos.screenY + 'px';
            const srcX = pos.canvasX - (loupeSize / zoom / 2);
            const srcY = pos.canvasY - (loupeSize / zoom / 2);
            const srcW = loupeSize / zoom; const srcH = loupeSize / zoom;
            ctxLoupe.clearRect(0, 0, loupeSize, loupeSize);
            ctxLoupe.drawImage(imgCanvas, srcX, srcY, srcW, srcH, 0, 0, loupeSize, loupeSize);
            ctxLoupe.drawImage(drawCanvas, srcX, srcY, srcW, srcH, 0, 0, loupeSize, loupeSize);
        }

        function startPosition(e) { 
            e.preventDefault(); 
            isDrawing = true; 
            magnifier.classList.remove('hidden'); 
            draw(e); 
        }
        
        function endPosition(e) { 
            e.preventDefault(); 
            if (!isDrawing) return;
            isDrawing = false; 
            magnifier.classList.add('hidden'); 
            ctxDraw.beginPath(); 
            
            // Saat jari diangkat, simpan history buat Undo
            saveState();
        }
        
        function draw(e) {
            if (!isDrawing) return; e.preventDefault();
            const pos = getPos(e);
            
            // Animasi Warna Aurora
            hue += hueDirection * 3; if(hue >= 320 || hue <= 180) hueDirection *= -1;
            ctxDraw.strokeStyle = `hsl(${hue}, 100%, 65%)`; 
            ctxDraw.shadowColor = `hsl(${hue}, 100%, 50%)`;
            ctxDraw.lineWidth = brushSizeInput.value;
            ctxDraw.lineTo(pos.canvasX, pos.canvasY); ctxDraw.stroke();
            ctxDraw.beginPath(); ctxDraw.moveTo(pos.canvasX, pos.canvasY);
            
            updateMagnifier(pos);
        }

        // Event listener Mouse & Touch
        drawCanvas.addEventListener('mousedown', startPosition); 
        drawCanvas.addEventListener('mouseup', endPosition);
        drawCanvas.addEventListener('mousemove', draw); 
        drawCanvas.addEventListener('mouseleave', endPosition);
        
        drawCanvas.addEventListener('touchstart', startPosition, { passive: false }); 
        drawCanvas.addEventListener('touchend', endPosition, { passive: false });
        drawCanvas.addEventListener('touchmove', draw, { passive: false });
        // Kalau jari keluar batas kanvas di HP
        drawCanvas.addEventListener('touchcancel', endPosition, { passive: false });

        // 3. PROSES AI (GEMINI VISION INPAINTING)
        btnProcess.addEventListener('click', async () => {
            const pixelBuffer = new Uint32Array(ctxDraw.getImageData(0, 0, drawCanvas.width, drawCanvas.height).data.buffer);
            if(!pixelBuffer.some(color => color !== 0)) return showNotification("Usap dulu objek yang mau dihapus Bos!", true);
            
            btnProcess.innerHTML = '<i class="fas fa-brain fa-spin mr-2"></i>AI Sedang Bekerja...';
            btnProcess.disabled = true; 
            btnProcess.classList.add('opacity-80', 'loader-pulse');
            showNotification("Mengirim data ke Server AI...", false);

            try {
                // Tumpuk gambar asli dengan coretan neon
                const tempCanvas = document.createElement('canvas');
                tempCanvas.width = drawCanvas.width;
                tempCanvas.height = drawCanvas.height;
                const tempCtx = tempCanvas.getContext('2d');
                tempCtx.drawImage(imgCanvas, 0, 0);
                tempCtx.drawImage(drawCanvas, 0, 0); 
                
                const base64Data = tempCanvas.toDataURL('image/jpeg', 0.8).split(',')[1];

                const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-image-preview:generateContent?key=${apiKey}`;
                
                const promptText = "Remove the colorful painted glowing lines/marks covering the object. Seamlessly reconstruct and inpaint the background behind those marks so it looks like the original undisturbed photo. Output only the clean image without any text or explanation.";

                const payload = {
                    contents: [{
                        role: "user",
                        parts: [
                            { text: promptText },
                            { inlineData: { mimeType: "image/jpeg", data: base64Data } }
                        ]
                    }],
                    generationConfig: { responseModalities: ["TEXT", "IMAGE"] }
                };

                let delays = [1000, 2000, 4000, 8000];
                let responseData = null;

                // Fitur Exponential Backoff
                for (let i = 0; i <= delays.length; i++) {
                    try {
                        const response = await fetch(url, {
                            method: "POST",
                            headers: { "Content-Type": "application/json" },
                            body: JSON.stringify(payload)
                        });

                        if (!response.ok) throw new Error("Server AI Sibuk");
                        const result = await response.json();
                        
                        const outBase64 = result.candidates?.[0]?.content?.parts?.find(p => p.inlineData)?.inlineData?.data;
                        if (!outBase64) throw new Error("Gagal mengekstrak gambar dari AI");

                        responseData = `data:image/jpeg;base64,${outBase64}`;
                        break; 
                    } catch (err) {
                        if (i === delays.length) throw new Error("Koneksi Time Out. Coba lagi nanti ya Bos.");
                        showNotification(`Mencoba ulang koneksi ke Server... (${i+1})`, false);
                        await new Promise(r => setTimeout(r, delays[i])); 
                    }
                }

                // Tampilkan Hasil Sukses
                resultImage.src = responseData;
                document.getElementById('btn-download').href = responseData;
                
                resultArea.classList.remove('hidden');
                resultArea.classList.add('flex');
                
                setTimeout(() => {
                    resultArea.scrollIntoView({ behavior: 'smooth', block: 'start' });
                }, 300);
                
                showNotification("Magic! Objek berhasil dihapus!");

            } catch (error) {
                console.error(error);
                showNotification(error.message, true);
            } finally {
                btnProcess.innerHTML = '<i class="fas fa-magic mr-2"></i>Hapus Objek';
                btnProcess.disabled = false; 
                btnProcess.classList.remove('opacity-80', 'loader-pulse');
            }
        });

        window.addEventListener('resize', () => { 
            if(!uploadArea.classList.contains('hidden')) return; 
            const imgData = ctxDraw.getImageData(0,0,drawCanvas.width, drawCanvas.height);
            setupCanvas(); ctxDraw.putImageData(imgData, 0, 0);
        });
    </script>
</body>
</html>
