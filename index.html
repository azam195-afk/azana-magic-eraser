<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AZANA Genesis - AI Image Architect</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&family=Rajdhani:wght@600;700;800&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Plus Jakarta Sans', 'sans-serif'], tech: ['Rajdhani', 'sans-serif'] },
                    colors: { neon: { cyan: '#00f2fe', purple: '#bc13fe' }, dark: { 950: '#050508', 900: '#0a0a14', 800: '#13131a', 700: '#1c1c26' } }
                }
            }
        }
    </script>
    <style>
        body { 
            background-color: #050508; 
            color: #cbd5e1; 
            min-height: 100vh; 
            display: flex; 
            flex-direction: column; 
            margin: 0;
            position: relative;
            overflow-x: hidden;
        }

        /* NEURAL BACKGROUND CANVAS */
        #neural-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 0;
            display: block;
            opacity: 0.8;
            pointer-events: none;
        }

        /* EFEK CAHAYA NEON HALUS DI POJOK */
        body::before {
            content: "";
            position: fixed;
            inset: 0;
            background: 
                radial-gradient(circle at 10% 10%, rgba(188, 19, 254, 0.15) 0%, transparent 45%),
                radial-gradient(circle at 90% 90%, rgba(0, 242, 254, 0.15) 0%, transparent 45%);
            z-index: 1;
            filter: blur(80px);
            pointer-events: none;
        }

        /* KOTAK 1:1 BENING TOTAL (TRANSPARAN KRISTAL) */
        .crystal-box { 
            background: transparent !important;
            border: 2px dashed rgba(0, 242, 254, 0.3);
            aspect-ratio: 1 / 1;
            width: 100%;
            max-width: 340px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-radius: 2.5rem;
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            backdrop-filter: blur(4px);
        }

        .crystal-box:hover {
            border-color: #bc13fe;
            box-shadow: 0 0 30px rgba(188, 19, 254, 0.2);
            transform: scale(1.02);
        }

        .shimmer {
            background: linear-gradient(90deg, transparent 0%, rgba(0, 242, 254, 0.05) 50%, transparent 100%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
        }
        @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

        .safe-italic { padding-right: 0.3em; display: inline-block; }

        textarea::placeholder { color: rgba(203, 213, 225, 0.2); }
    </style>
</head>
<body>

    <!-- NEURAL ENGINE -->
    <canvas id="neural-bg"></canvas>

    <div class="flex-grow flex flex-col items-center p-6 w-full relative z-10">
        
        <header class="text-center w-full max-w-3xl mt-12 mb-10 flex flex-col items-center">
            <div class="w-14 h-14 rounded-2xl bg-dark-900/60 border border-neon-purple/30 flex items-center justify-center text-neon-purple shadow-[0_0_20px_rgba(188,19,254,0.2)] mb-3 animate-pulse">
                <i class="fas fa-magic text-3xl"></i>
            </div>
            <h1 class="text-3xl md:text-6xl font-tech font-bold text-white tracking-widest uppercase italic leading-tight">
                AZANA <span class="text-transparent bg-clip-text bg-gradient-to-r from-neon-cyan to-neon-purple safe-italic">GENESIS PRO</span>
            </h1>
            <p class="text-slate-500 text-[10px] md:text-xs max-w-xl mx-auto mt-4 opacity-70 uppercase tracking-[0.4em] font-tech font-bold">
                Neural Visual Generation System v4.0
            </p>
        </header>

        <main class="w-full flex flex-col items-center gap-8">
            
            <!-- INPUT PROMPT AREA -->
            <div class="w-full max-w-[340px] flex flex-col gap-4">
                <div class="bg-dark-900/40 border border-white/5 rounded-2xl p-4 backdrop-blur-md">
                    <label class="block text-[10px] font-tech font-bold text-neon-cyan uppercase tracking-widest mb-2 ml-1">Visi Imajinasi Anda</label>
                    <textarea id="prompt-input" rows="3" 
                        placeholder="Contoh: Futuristic cyborg in a dark neon city, cinematic lighting, ultra detailed..."
                        class="w-full bg-transparent border-none text-white text-xs outline-none resize-none font-sans leading-relaxed"></textarea>
                </div>
                
                <button id="btn-generate" class="w-full bg-gradient-to-r from-neon-purple to-neon-cyan text-white font-bold py-5 rounded-2xl shadow-[0_10px_40px_rgba(188,19,254,0.3)] hover:scale-105 active:scale-95 transition-all flex items-center justify-center gap-4 font-tech tracking-[0.2em] text-sm uppercase">
                    <i class="fas fa-bolt"></i> GENERATE VISUAL
                </button>
            </div>

            <!-- HASIL / LOADING AREA -->
            <div id="display-area" class="crystal-box overflow-hidden relative">
                <!-- Initial State -->
                <div id="placeholder" class="flex flex-col items-center">
                    <span class="w-16 h-16 bg-white/5 rounded-3xl flex items-center justify-center mb-6 text-2xl text-slate-700 border border-white/10">
                        <i class="fas fa-sparkles"></i>
                    </span>
                    <span class="text-slate-600 text-[10px] font-tech tracking-widest uppercase text-center px-8">Menunggu Instruksi Visi Anda</span>
                </div>

                <!-- Processing State -->
                <div id="processing-state" class="hidden absolute inset-0 shimmer z-10 flex-col items-center justify-center gap-6">
                    <i class="fas fa-atom fa-spin text-neon-cyan text-5xl"></i>
                    <span class="font-tech text-white tracking-[0.5em] text-xs uppercase italic">Architecting pixels...</span>
                </div>

                <!-- Result State -->
                <img id="result-image" src="" class="hidden absolute inset-0 w-full h-full object-cover">
                
                <!-- Download Overlay -->
                <a id="download-btn" href="#" download="AZANA_GENESIS_HD.jpg" class="hidden absolute bottom-6 right-6 w-12 h-12 bg-white text-black rounded-full shadow-2xl items-center justify-center z-20 hover:scale-110 active:scale-90 transition-all">
                    <i class="fas fa-download"></i>
                </a>
            </div>

            <!-- REFRESH BUTTON (After Result) -->
            <div id="after-generate" class="hidden w-full max-w-[340px]">
                <button onclick="location.reload()" class="w-full text-slate-500 hover:text-white font-tech tracking-widest uppercase text-[9px] transition-all py-3 font-bold text-center">
                    <i class="fas fa-redo-alt mr-2"></i> BUAT VISI BARU
                </button>
            </div>
        </main>
    </div>

<div id="footer"></div>

<script>
// FETCH FOOTER SESUAI STRUKTUR KAMU
fetch('components/footer-ai.html')
  .then(response => response.text())
  .then(data => {
    document.getElementById('footer').innerHTML = data;
  });
</script>
    
    <!-- SCRIPT NEURAL ENGINE (IDENTIK DENGAN PENJERNIH.HTML) -->
    <script>
        const canvas = document.getElementById('neural-bg');
        const ctx = canvas.getContext('2d');
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', () => { resizeCanvas(); initNodes(); });
        resizeCanvas();
        const particlesArray = [];
        const colors = ['#00f2fe', '#bc13fe'];
        class Particle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 1.5 + 0.5;
                this.speedX = (Math.random() * 0.5) - 0.25;
                this.speedY = (Math.random() * 0.5) - 0.25;
                this.color = colors[Math.floor(Math.random() * colors.length)];
            }
            update() {
                this.x += this.speedX; this.y += this.speedY;
                if (this.x < 0 || this.x > canvas.width) this.speedX *= -1;
                if (this.y < 0 || this.y > canvas.height) this.speedY *= -1;
            }
            draw() {
                ctx.fillStyle = this.color;
                ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2); ctx.fill();
            }
        }
        function initNodes() {
            particlesArray.length = 0;
            let numberOfParticles = (canvas.height * canvas.width) / 9500;
            if (numberOfParticles > 130) numberOfParticles = 130;
            for (let i = 0; i < numberOfParticles; i++) { particlesArray.push(new Particle()); }
        }
        function animateNodes() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            for (let i = 0; i < particlesArray.length; i++) {
                particlesArray[i].update();
                particlesArray[i].draw();
                for (let j = i; j < particlesArray.length; j++) {
                    const dx = particlesArray[i].x - particlesArray[j].x;
                    const dy = particlesArray[i].y - particlesArray[j].y;
                    const distance = Math.sqrt(dx * dx + dy * dy);
                    if (distance < 150) {
                        ctx.beginPath(); ctx.strokeStyle = particlesArray[i].color;
                        ctx.globalAlpha = 1 - (distance / 150);
                        ctx.lineWidth = 0.6; ctx.moveTo(particlesArray[i].x, particlesArray[i].y);
                        ctx.lineTo(particlesArray[j].x, particlesArray[j].y); ctx.stroke(); ctx.globalAlpha = 1;
                    }
                }
            }
            requestAnimationFrame(animateNodes);
        }
        window.onload = function() { initNodes(); animateNodes(); };

        // --- GENESIS AI LOGIC ---
        const btnGenerate = document.getElementById('btn-generate');
        const promptInput = document.getElementById('prompt-input');
        const placeholder = document.getElementById('placeholder');
        const processingState = document.getElementById('processing-state');
        const resultImage = document.getElementById('result-image');
        const downloadBtn = document.getElementById('download-btn');
        const afterGenerate = document.getElementById('after-generate');

        // TOKEN HUGGING FACE (Harus diisi agar jalan)
        const HF_TOKEN = ""; 

        btnGenerate.addEventListener('click', async () => {
            const prompt = promptInput.value.trim();
            if (!prompt) return;

            // Start Loading UI
            btnGenerate.disabled = true;
            btnGenerate.innerHTML = '<i class="fas fa-circle-notch fa-spin"></i> ARCHITECTING...';
            placeholder.classList.add('hidden');
            processingState.classList.remove('hidden');
            processingState.classList.add('flex');

            try {
                // Gunakan model FLUX.1 Schnell (Paling cepat & High Quality)
                const response = await fetch(
                    "https://api-inference.huggingface.co/models/black-forest-labs/FLUX.1-schnell",
                    {
                        headers: { Authorization: `Bearer ${HF_TOKEN}` },
                        method: "POST",
                        body: JSON.stringify({ 
                            inputs: `High-end professional photography, 8k, futuristic, hyper-realistic, ${prompt}` 
                        }),
                    }
                );

                if (!response.ok) throw new Error("API Limit reached or Error.");

                const blob = await response.blob();
                const url = URL.createObjectURL(blob);

                // Show Result
                resultImage.src = url;
                resultImage.onload = () => {
                    processingState.classList.add('hidden');
                    processingState.classList.remove('flex');
                    resultImage.classList.remove('hidden');
                    downloadBtn.href = url;
                    downloadBtn.style.display = 'flex';
                    afterGenerate.classList.remove('hidden');
                    btnGenerate.innerHTML = '<i class="fas fa-check"></i> SUCCESS';
                };

            } catch (err) {
                alert("Koneksi gagal atau Limit API tercapai. Silakan coba lagi nanti.");
                location.reload();
            }
        });
    </script>
</body>
</html>
